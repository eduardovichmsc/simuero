<a [routerLink]="href" class="group cursor-pointer flex flex-col h-full">
  <div class="aspect-square md:aspect-[4/5] overflow-hidden mb-4">
    <img
      [src]="blog.imageUrl"
      [alt]="blog.title"
      class="w-full h-full object-cover transition-transform duration-700 group-hover:scale-105"
    />
  </div>

  <div class="flex flex-col flex-grow">
    <p class="text-xs md:text-sm font-semibold tracking-tight text-black mb-1">
      {{ blog.category }}
    </p>

    <h3 class="text-xl md:text-2xl font-medium leading-tight tracking-tight text-black mb-3">
      {{ blog.title }}
    </h3>

    <p class="text-sm text-gray-800 leading-relaxed mb-4">
      {{ blog.description }}
    </p>

    <app-link [href]="link + '/' + blog.id">Read article</app-link>
  </div>
</a>
